<!DOCTYPE html>
<html lang="tr">
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h2>Geoanalyst Kayıt</h2>
    <input type="email" id="email" placeholder="E-posta">
    <button onclick="mailGonder()">Kodu Gönder</button>
    <br><br>
    <input type="text" id="kod" placeholder="Mailine gelen kod">
    <input type="password" id="sifre" placeholder="Şifre">
    <button onclick="dogrulaVeKayitOl()">Doğrula ve Kayıt Ol</button>

    <script>
        const SUPABASE_URL = "https://dkmwtyncxxmgotepgjxr.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRrbXd0eW5jeHhtZ290ZXBnanhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5NTI4NTMsImV4cCI6MjA5OTUyODg1M30.jWgHdwD62RmDIwna2p7IINOsYePsmCvsg1I3-it40YI"; 
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 1. Mail Gönderme
        async function mailGonder() {
            const email = document.getElementById("email").value;
            const { error } = await supabase.auth.signInWithOtp({ email: email });
            if (error) alert(error.message);
            else alert("Doğrulama kodu mailine gönderildi!");
        }

        // 2. Doğrulama ve Kayıt
        async function dogrulaVeKayitOl() {
            const email = document.getElementById("email").value;
            const sifre = document.getElementById("sifre").value;
            const kod = document.getElementById("kod").value;

            // Kodu doğrula
            const { data, error } = await supabase.auth.verifyOtp({
                email: email,
                token: kod,
                type: 'signup'
            });

            if (error) alert("Hata: " + error.message);
            else {
                // Kayıt başarılıysa, kendi 'Kullanıcılar' tablona da ekle
                await supabase.from('Kullanıcılar').insert([{ email: email, sifre: sifre }]);
                alert("Kayıt tamamlandı!");
            }
        }
    </script>
</body>
</html>
