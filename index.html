        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function kayitOl() {

            if (error) {
                alert("Hata: " + error.message);
            } else {
                alert("Başarıyla kayıt oldun!");
            }
        }
    </script>
