<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Geoanalyst Kayıt</title>
    <!-- Supabase kütüphanesi -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h2>Geoanalyst'e Hoş Geldin</h2>
    <input type="email" id="email" placeholder="E-posta"><br>
    <input type="password" id="sifre" placeholder="Şifre"><br>
    <button onclick="webdenKayitOl()">Kayıt Ol</button>

    <script>
        // --- BURAYI DOLDUR ---
        const SUPABASE_URL = "https://dkmwtyncxxmgotepgjxr.supabase.co";
        const SUPABASE_KEY = "BURAYA_ANON_KEY_YAZ"; 
        // ---------------------

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function webdenKayitOl() {
            const eposta = document.getElementById("email").value;
            const sifre = document.getElementById("sifre").value;

            console.log("Kayıt denemesi başladı...");

            const { data, error } = await supabase
                .from('Kullanıcılar')
                .insert([{ email: eposta, sifre: sifre, abonelik_tipi: 'Normal', kalan_kredi: 10 }]);

            if (error) {
                console.error("Hata:", error);
                alert("Hata: " + error.message);
            } else {
                alert("Başarıyla kayıt oldun!");
            }
        }
    </script>
</body>
</html>
